name: New Subscriber Welcome Run
on:
  repository_dispatch:
    types: [new_subscriber]
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  welcome-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Sync new signups from form
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          UNSUBSCRIBE_SHEET_CSV_URL: ${{ secrets.UNSUBSCRIBE_SHEET_CSV_URL }}
        run: python AI_project/scripts/sync_signups.py
      - name: Pull latest data after sync
        run: git pull --rebase
      - name: Run pipeline for new subscriber
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
        run: python AI_project/scripts/run_pipeline.py
      - name: Generate dashboard
        run: python AI_project/scripts/generate_dashboard.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AI_project/data/ AI_project/docs/dashboard.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Welcome run for new subscriber [automated]"
          git push
