name: Job Alert Pipeline

on:
  schedule:
    # Runs every 3 hours (UTC). Adjust as needed.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}  # allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Sync new signups from form
        id: sync
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          UNSUBSCRIBE_SHEET_CSV_URL: ${{ secrets.UNSUBSCRIBE_SHEET_CSV_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          output=$(python AI_project/scripts/sync_signups.py)
          echo "$output"
          # Extract number of new subscribers added
          new_count=$(echo "$output" | grep -oP '\d+(?= new subscriber)' || echo "0")
          echo "new_subscribers=$new_count" >> $GITHUB_OUTPUT

      - name: Run job alert pipeline
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          PIPELINE_OWNER_EMAIL: ${{ secrets.PIPELINE_OWNER_EMAIL }}
          NEW_SUBSCRIBERS: ${{ steps.sync.outputs.new_subscribers }}
        run: python AI_project/scripts/run_pipeline.py

      - name: Generate dashboard
        run: python AI_project/scripts/generate_dashboard.py

      - name: Commit updated data and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AI_project/data/ AI_project/docs/dashboard.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Update job alert data [automated]"
          git push
